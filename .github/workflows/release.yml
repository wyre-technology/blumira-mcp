name: Release

on:
  push:
    branches:
      - main
      - next
      - next-major
      - beta
      - alpha
      - '*.x'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      released: ${{ steps.release-version.outputs.released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Get released version
        id: release-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if gh release view "v$VERSION" --repo ${{ github.repository }} &>/dev/null; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Pack and upload MCPB bundle
        if: steps.release-version.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g @anthropic-ai/mcpb
          npm run pack:mcpb
          gh release upload "v${{ steps.release-version.outputs.version }}" blumira-mcp.mcpb \
            --repo ${{ github.repository }} --clobber

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # Sequence after release so the image tag reflects the bumped version
    # rather than the pre-release version baked into package.json on the
    # triggering commit. The MCP Registry verifies tag-pinned images, so
    # tag/version drift breaks publishing.
    needs: [release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        # Source of truth is the release job's computed version (semantic-release's
        # in-memory bump). Reading package.json here would be wrong because
        # @semantic-release/git's push back to main is silently dropped by
        # branch protection. We use the release output so docker tags match
        # the GitHub release/git tag.
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            echo "ERROR: needs.release.outputs.version is empty" >&2
            exit 1
          fi
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/wyre-technology/blumira-mcp:latest
            ghcr.io/wyre-technology/blumira-mcp:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/wyre-technology/blumira-mcp:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [release, docker]
    # Only publish to the registry on actual semantic-release versions
    if: needs.release.outputs.released == 'true'
    permissions:
      id-token: write   # Required for GitHub OIDC auth to the MCP Registry
      contents: read
    env:
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Checkout (post-release commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Stamp version into server.json
        # server.json is committed with version "0.0.0" placeholders; replace
        # them with the just-released version so the OCI identifier points at
        # the image tag the docker job just pushed.
        run: |
          jq --arg v "$VERSION" \
            '.version = $v
             | .packages[0].identifier = "ghcr.io/wyre-technology/blumira-mcp:v" + $v' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Verify registry listing
        run: |
          sleep 5
          curl -sf "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.wyre-technology/blumira-mcp" \
            | jq '.servers[] | {name, version}'
